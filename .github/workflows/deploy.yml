name: Deploy to GitHub Pages (foundation-try-on)

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build web component (library)
        run: npm run build:element

      - name: Prepare deploy root — use example-integration.html as index
        run: |
          cp example-integration.html dist/index.html
          sed -i 's|src="dist/virtual-try-on.js"|src="virtual-try-on.js"|g' dist/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
